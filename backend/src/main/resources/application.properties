# ─── Servidor ──────────────────────────────────────────────────────────────
server.port=8080

# ─── Base de datos ─────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agrotrack?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ───────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:agrotrack-super-secret-key-dra-ual-2026-must-be-at-least-256-bits}
jwt.expiration-ms=86400000

# ─── Email / Mailpit ───────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ─── Spring AI — Google Gemini ─────────────────────────────────────────────
spring.ai.google.gemini.api-key=${GEMINI_API_KEY:CHANGE_ME}
spring.ai.google.gemini.chat.options.model=gemini-2.0-flash

# ─── Spring AI — MCP Server ────────────────────────────────────────────────
spring.ai.mcp.server.name=agrotrack-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# ─── Scheduling ────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

# ─── Jackson ───────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Madrid

# ─── Logging ───────────────────────────────────────────────────────────────
logging.level.es.ual.dra.agrotrack=INFO
logging.level.org.springframework.ai=DEBUG
