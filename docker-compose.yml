services:

  mysql:
    image: mysql:8.0
    container_name: agrotrack-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agrotrack
    volumes:
      - mysql_data:/var/lib/mysql

  ollama:
    image: ollama/ollama:latest
    container_name: agrotrack-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agrotrack-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/agrotrack?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OLLAMA_CHAT_MODEL=llama3.2:3b
      - JWT_SECRET=${JWT_SECRET:-agrotrack-secret-key-dra-ual-2026-must-be-at-least-256-bits-long}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN:-dev-mcp-service-token-cambiar-en-prod}
    depends_on:
      - mysql
      - ollama

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: agrotrack-mcp-server
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - BACKEND_BASE_URL=http://backend:8080
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN:-dev-mcp-service-token-cambiar-en-prod}
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: agrotrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    # Desactivado hasta inicializar Angular (Fase 5).
    # Para levantarlo: docker-compose --profile frontend up
    profiles:
      - frontend

volumes:
  mysql_data:
  ollama_data:
