services:

  mysql:
    image: mysql:8.0
    container_name: agrotrack-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agrotrack
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agrotrack-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/agrotrack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # LM Studio corre en el host del usuario; el backend lo alcanza
      # vía host.docker.internal (Mac/Windows). El modelo debe estar
      # cargado y "Serve on Local Network" activo en LM Studio.
      - SPRING_AI_OPENAI_BASE_URL=http://host.docker.internal:1234
      - SPRING_AI_OPENAI_CHAT_MODEL=qwen/qwen3.5-9b
      - SPRING_AI_OPENAI_API_KEY=lm-studio
      # Conexión al mcp-server por la red interna de Docker
      - AGROTRACK_MCP_URL=http://mcp-server:8081
      - JWT_SECRET=${JWT_SECRET:-agrotrack-secret-key-dra-ual-2026-must-be-at-least-256-bits-long}
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN:-dev-mcp-service-token-cambiar-en-prod}
    depends_on:
      - mysql
      - mcp-server
    extra_hosts:
      # Necesario para que host.docker.internal funcione en Linux
      - "host.docker.internal:host-gateway"

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: agrotrack-mcp-server
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - BACKEND_BASE_URL=http://backend:8080
      - MCP_SERVICE_TOKEN=${MCP_SERVICE_TOKEN:-dev-mcp-service-token-cambiar-en-prod}
    # Sin depends_on backend: el mcp-server solo llama al backend en runtime
    # (al ejecutar una tool), cuando el backend ya está arriba. Declararlo
    # crearía un ciclo backend ↔ mcp-server. El orden lo fija backend, que sí
    # depende del mcp-server para descubrir las tools al arrancar.

  frontend:
    build: ./frontend
    container_name: agrotrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
