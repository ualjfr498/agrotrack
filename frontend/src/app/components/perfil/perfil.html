<div class="container narrow">
  <header class="page-header">
    <h1>Mi perfil</h1>
    <p class="muted">Actualiza tus datos y tu foto de perfil.</p>
  </header>

  @if (loading()) {
    <p class="muted">Cargando…</p>
  } @else {
    @if (error(); as msg) {
      <div class="alert alert-error">{{ msg }}</div>
    }
    @if (guardado()) {
      <div class="alert alert-success">Perfil actualizado correctamente.</div>
    }

    <section class="card">
      <div class="perfil-foto">
        @if (foto(); as f) {
          <img [src]="f" alt="Foto de perfil" class="avatar" />
        } @else {
          <div class="avatar avatar-placeholder">🧑‍🌾</div>
        }
        <div class="foto-actions">
          <label class="btn btn-secondary btn-sm">
            Cambiar foto
            <input type="file" accept="image/*" (change)="onFoto($event)" hidden />
          </label>
          @if (foto()) {
            <button type="button" class="btn btn-secondary btn-sm" (click)="quitarFoto()">Quitar</button>
          }
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="form-field">
          <label for="email">Correo</label>
          <input id="email" type="email" [value]="perfil()?.email" disabled />
        </div>
        <div class="form-field">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" formControlName="nombre" />
        </div>
        <div class="form-field">
          <label for="apellidos">Apellidos</label>
          <input id="apellidos" type="text" formControlName="apellidos" />
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
    </section>
  }
</div>
